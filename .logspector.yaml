# Базовый конфигурационный файл Logspector

# Путь к файлу логов (можно указать несколько через запятую)
files: "test.log"

# Читать логи напрямую из Docker-контейнера (оставьте пустым, если читаете из файлов)
# docker: "my-container"

# Читать логи напрямую из Kubernetes pod'а (оставьте пустым, если читаете из файлов или docker)
# kube: "my-pod"

# Дополнительные аргументы для kubectl (например, "-n my-namespace")
# kube_args: "-n staging"

# Уровень логирования по умолчанию (ERROR, WARN, INFO, DEBUG)
# level: "INFO"

# Поиск и исключения (grep / invert match)
# query: "user_id"
# invert: "healthcheck"

# Фильтрация по времени
# since: "1h"

# Принудительный вывод JSON
json: false
# Отключить цвета
no_color: false